name: Build onedir for Windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Upgrade pip and install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.18.0 pillow

      - name: Build onefile distribution
        # Use cmd shell for caret (^) line continuation and Windows-style add-data
        shell: cmd
        run: |
          pyinstaller --clean --onefile --noconsole --name "FabBlocksIDE0.3" ^
            --add-data "html;html" ^
            --add-data "icons;icons" ^
            --add-data "examples;examples" ^
            --add-data "data_serial;data_serial" ^
            --add-data "saves;saves" ^
            --hidden-import tkinter ^
            --splash "icons/load_codigo.png" ^
            qtwebhtml.py

      - name: Show dist contents
        run: |
          dir dist\

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: fabblocks-exe-windows
          path: dist\FabBlocksIDE0.3.exe
