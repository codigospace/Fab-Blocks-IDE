name: Build onedir for Windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Upgrade pip and install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.18.0 pillow

      - name: Build onedir distribution
        run: |
          pyinstaller --clean FabBlocksIDE.spec

      - name: Ensure python DLL at root
        run: |
          # use PowerShell syntax rather than CMD-style 'if exist'
          if (Test-Path "dist\FabBlocksIDE\_internal\python311.dll") {
            Copy-Item -Path "dist\FabBlocksIDE\_internal\python311.dll" \
                      -Destination "dist\FabBlocksIDE\" -Force
          }

      - name: Show dist\FabBlocksIDE contents
        run: |
          dir dist\FabBlocksIDE\

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: fabblocks-dist-windows
          path: dist/FabBlocksIDE/
