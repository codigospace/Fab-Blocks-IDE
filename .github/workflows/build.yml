name: Build onedir for Windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Upgrade pip and install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.18.0 pillow

      - name: Build one-directory distribution (spec)
        shell: cmd
        run: |
          pyinstaller --clean "FabBlocksIDE.spec"

      - name: Show build output
        run: |
          dir dist\

      - name: Zip one-directory bundle
        run: |
          powershell -Command "Compress-Archive -Path 'dist\FabBlocksIDE\*' -DestinationPath 'dist\FabBlocksIDE.zip' -Force"

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: fabblocks-windows-zip
          path: dist\FabBlocksIDE.zip
