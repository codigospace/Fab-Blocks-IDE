name: Windows Build (PyInstaller)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean -y FabBlocksIDE.spec
          
      - name: Zip build folder
        run: |
          powershell -Command "Compress-Archive -Path 'dist\FabBlocksIDE\*' -DestinationPath 'dist\FabBlocksIDE_Windows.zip' -Force"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FabBlocksIDE-Windows
          path: dist\FabBlocksIDE_Windows.zip
          retention-days: 5
